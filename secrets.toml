# ─────────────────────────────────────────────────────────────────
# .streamlit/secrets.toml
#
# !! NEVER commit this file to git !!
# It is already listed in .gitignore
#
# Fill in your real values below and save.
# Streamlit reads this automatically when you run locally.
# On Streamlit Cloud, paste these key-values in the Secrets panel.
# ─────────────────────────────────────────────────────────────────

# ── Dashboard login ─────────────────────────────────────────────
DASH_USER     = "admin"          # change to your username
DASH_PASSWORD = "change_me_now"  # use a strong password

# ── Fyers API credentials ────────────────────────────────────────
FYERS_CLIENT_ID = "XXXX-100"          # e.g. "AB1234-100"
FYERS_SECRET_KEY = "your_secret_key"
FYERS_USERNAME   = "your_fyers_id"    # e.g. "XA12345"
FYERS_PIN        = "1234"             # your 4-digit PIN
FYERS_TOTP_KEY   = "BASE32TOTPSECRET" # from Fyers TOTP setup page
